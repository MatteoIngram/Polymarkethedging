<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Hedge</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0f0f;--ink2:#888;--ink3:#bbb;--border:#ececec;--off:#fafafa;--white:#fff;--red:#c0392b;--green:#27ae60;--blue:#2980b9;--orange:#e67e22}
html,body{min-height:100vh;background:var(--off);color:var(--ink);font-family:'DM Mono',monospace}
nav{position:fixed;top:0;left:0;right:0;height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 40px;justify-content:space-between;z-index:100}
.nav-left{font-family:'EB Garamond',Georgia,serif;font-size:15px;font-weight:400;color:var(--ink2);text-decoration:none;letter-spacing:.02em;transition:color .15s}
.nav-left:hover{color:var(--ink)}
.nav-right{font-size:10px;font-weight:300;color:var(--ink3);letter-spacing:.1em}
.page{max-width:900px;margin:0 auto;padding:88px 40px 80px}
.page-header{margin-bottom:52px;border-bottom:1px solid var(--border);padding-bottom:28px}
.page-title{font-family:'EB Garamond',Georgia,serif;font-size:clamp(28px,4vw,46px);font-weight:400;line-height:1.1;letter-spacing:.01em;color:var(--ink);margin-bottom:10px}
.page-sub{font-size:10px;font-weight:300;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}

/* Tab switcher */
.tab-bar{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white)}
.tab{flex:1;padding:11px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);background:var(--white);border:none;cursor:pointer;transition:background .15s,color .15s;text-align:center}
.tab:not(:last-child){border-right:1px solid var(--border)}
.tab.active{background:var(--ink);color:var(--white)}
.tab:hover:not(.active){background:var(--off);color:var(--ink2)}
.tab-panel{display:none}
.tab-panel.active{display:block}

.section{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:32px;margin-bottom:20px}
.section-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 28px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px 28px}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:10px;font-weight:400;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase}
.field input,.field select,.field textarea{font-family:'DM Mono',monospace;font-size:14px;font-weight:400;color:var(--ink);background:var(--off);border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%;transition:border-color .15s,background .15s;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ink3);background:var(--white)}
.field input::placeholder,.field textarea::placeholder{color:var(--ink3)}
.field textarea{resize:vertical;min-height:72px;line-height:1.6;font-size:13px}
.field-full{grid-column:1/-1}
.run-btn{margin-top:24px;width:100%;padding:13px;font-family:'DM Mono',monospace;font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);background:var(--white);border:1px solid var(--ink);border-radius:7px;cursor:pointer;transition:background .15s,color .15s}
.run-btn:hover{background:var(--ink);color:var(--white)}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px}
.metric{background:var(--white);padding:18px 20px}
.metric-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-family:'EB Garamond',Georgia,serif;font-size:28px;font-weight:400;color:var(--ink);line-height:1;letter-spacing:-.01em}
.metric-value.pos{color:var(--green)}
.metric-value.neg{color:var(--red)}
.metric-sub{font-size:10px;font-weight:300;color:var(--ink3);margin-top:5px;letter-spacing:.04em}
.ranges-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px}
.range-cell{background:var(--white);padding:16px 20px}
.range-cell-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.range-cell-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:400;color:var(--ink)}
.range-cell-value.pos{color:var(--green)}
.range-cell-value.neg{color:var(--red)}
.chart-wrap{position:relative;height:300px;margin-bottom:20px}
.insight{font-size:11px;font-weight:300;color:var(--ink2);line-height:1.8;letter-spacing:.02em;padding:16px 20px;border-left:2px solid var(--border);background:var(--off);border-radius:0 6px 6px 0}
.insight strong{font-weight:500;color:var(--ink)}
.div-line{height:1px;background:var(--border);margin:24px 0}

/* Real-world hedge specific */
.scenario-presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.preset-btn{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;letter-spacing:.07em;color:var(--ink2);background:var(--off);border:1px solid var(--border);border-radius:5px;padding:7px 13px;cursor:pointer;transition:all .15s}
.preset-btn:hover{border-color:var(--ink3);color:var(--ink);background:var(--white)}
.preset-btn.active-preset{border-color:var(--ink);color:var(--ink);background:var(--white)}
.preset-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}

.hedge-output-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px}
.hedge-cell{background:var(--white);padding:20px}
.hedge-cell-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.hedge-cell-value{font-family:'EB Garamond',Georgia,serif;font-size:22px;font-weight:400;color:var(--ink);line-height:1.2}
.hedge-cell-value.pos{color:var(--green)}
.hedge-cell-value.neg{color:var(--red)}
.hedge-cell-value.neutral{color:var(--blue)}
.hedge-cell-sub{font-size:10px;font-weight:300;color:var(--ink3);margin-top:5px}

.scenario-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px}
.scenario-table th{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:400;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.scenario-table td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--ink2);vertical-align:top;line-height:1.6}
.scenario-table tr:last-child td{border-bottom:none}
.scenario-table .val{font-weight:500;color:var(--ink)}
.scenario-table .pos{color:var(--green)}
.scenario-table .neg{color:var(--red)}
.scenario-table .neutral{color:var(--blue)}

.hedge-ratio-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px}
.hedge-ratio-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s ease}

.tag{display:inline-block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid var(--border);color:var(--ink3);margin-left:8px;vertical-align:middle}
.tag.event{border-color:#d4a017;color:#b8860b;background:#fefdf7}
.tag.hedge{border-color:#2980b9;color:#2980b9;background:#f5f9fd}

footer{margin-top:60px;padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.footer-name{font-family:'EB Garamond',Georgia,serif;font-size:15px;font-weight:400;color:var(--ink2)}
.footer-links{display:flex;gap:20px}
.footer-link{font-size:10px;font-weight:300;color:var(--ink3);text-decoration:none;letter-spacing:.07em;transition:color .15s}
.footer-link:hover{color:var(--ink)}
@media(max-width:600px){.form-grid,.form-grid-3,.metrics-row,.ranges-row,.hedge-output-grid{grid-template-columns:1fr}.page{padding:80px 20px 60px}nav{padding:0 20px}footer{flex-direction:column;gap:16px;text-align:center}.scenario-presets{gap:6px}}
</style>
</head>
<body>

<nav>
  <a class="nav-left" href="index.html">Castellaro-Ingram</a>
  <div class="nav-right">Polymarket Hedge — V2</div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-title">Polymarket Hedge</div>
    <div class="page-sub">Dual strike payoff · Real-world scenario hedging</div>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="stock">Stock / Dual Strike</button>
    <button class="tab" data-tab="realworld">Real-World Hedge</button>
  </div>

  <!-- ===================== TAB 1: STOCK ===================== -->
  <div class="tab-panel active" id="tab-stock">
    <div class="section">
      <div class="section-label">Parameters</div>
      <div class="form-grid">
        <div class="field">
          <label>Stock Entry Price (S&#8320;)</label>
          <input type="number" id="entryPrice" step="any" placeholder="e.g. 100">
        </div>
        <div class="field">
          <label>Position Size ($)</label>
          <input type="number" id="positionSize" step="any" placeholder="e.g. 10000">
        </div>
        <div class="field">
          <label>Stock Direction</label>
          <select id="stockDirection">
            <option value="short" selected>Short</option>
            <option value="long">Long</option>
          </select>
        </div>
        <div class="field">
          <label>Poly Direction</label>
          <select id="polyDirection">
            <option value="up">Up</option>
            <option value="down" selected>Down</option>
          </select>
        </div>
        <div class="field">
          <label>Poly Premium</label>
          <input type="number" id="premium" step="any" placeholder="e.g. 200">
        </div>
        <div class="field">
          <label>Poly Payout</label>
          <input type="number" id="payout" step="any" placeholder="e.g. 1000">
        </div>
        <div class="field">
          <label>Poly Strike Price (K)</label>
          <input type="number" id="polyStrike" step="any" placeholder="e.g. 105">
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <input type="text" value="Separate from entry (S&#8320;)" disabled style="color:var(--ink3);cursor:default;">
        </div>
      </div>
      <button class="run-btn" id="runBtn">Run analysis</button>
    </div>
    <div id="output"></div>
  </div>

  <!-- ===================== TAB 2: REAL-WORLD ===================== -->
  <div class="tab-panel" id="tab-realworld">
    <div class="section">
      <div class="section-label">Scenario Presets</div>
      <div class="preset-label">Quick-load an example</div>
      <div class="scenario-presets">
        <button class="preset-btn" data-preset="shipping">⛴ Shipping — Canal closure</button>
        <button class="preset-btn" data-preset="restaurant">⚽ Restaurant — Arsenal wins</button>
        <button class="preset-btn" data-preset="ski">⛷ Ski resort — Low snowfall</button>
        <button class="preset-btn" data-preset="energy">⚡ Utility — Warm winter</button>
        <button class="preset-btn" data-preset="airline">✈ Airline — Oil price spike</button>
        <button class="preset-btn" data-preset="farmer">🌾 Farmer — Drought</button>
      </div>

      <div class="section-label" style="margin-top:8px">Business Exposure</div>
      <div class="form-grid">
        <div class="field field-full">
          <label>Business description</label>
          <textarea id="rwDesc" placeholder="e.g. Shipping company routing 4 vessels per month through the Suez Canal"></textarea>
        </div>
        <div class="field">
          <label>Revenue at risk ($)</label>
          <input type="number" id="rwRevenue" step="any" placeholder="e.g. 400000">
        </div>
        <div class="field">
          <label>Event outcome that hurts you</label>
          <select id="rwBadOutcome">
            <option value="yes">Event resolves YES (happens)</option>
            <option value="no">Event resolves NO (doesn't happen)</option>
          </select>
        </div>
        <div class="field">
          <label>Revenue loss if bad event ($)</label>
          <input type="number" id="rwLoss" step="any" placeholder="e.g. 160000">
        </div>
        <div class="field">
          <label>Revenue gain if good event ($)</label>
          <input type="number" id="rwGain" step="any" placeholder="e.g. 400000">
        </div>
      </div>

      <div class="div-line"></div>
      <div class="section-label">Polymarket Position</div>
      <div class="form-grid-3">
        <div class="field">
          <label>Market probability (%)</label>
          <input type="number" id="rwProb" step="any" placeholder="e.g. 35" min="1" max="99">
        </div>
        <div class="field">
          <label>Stake ($)</label>
          <input type="number" id="rwStake" step="any" placeholder="e.g. 25000">
        </div>
        <div class="field">
          <label>Hedge direction</label>
          <select id="rwHedgeDir">
            <option value="yes">Bet YES</option>
            <option value="no">Bet NO</option>
          </select>
        </div>
      </div>
      <button class="run-btn" id="rwRunBtn">Analyse hedge</button>
    </div>

    <div id="rw-output"></div>
  </div>

  <footer>
    <div class="footer-name">Castellaro-Ingram</div>
    <div class="footer-links">
      <a class="footer-link" href="mailto:ing.matteo.mi@gmail.com">email</a>
      <a class="footer-link" href="https://www.linkedin.com/in/matteo-ingram/" target="_blank">linkedin</a>
    </div>
  </footer>

</div>

<script>
/* =========================================================
   TAB SWITCHING
   ========================================================= */
document.querySelectorAll('.tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* =========================================================
   PRESET DATA
   ========================================================= */
var PRESETS = {
  shipping: {
    desc: 'Shipping company routing 4 vessels per month through the Suez Canal. Canal closure forces Red Sea detour adding ~$40k/vessel in fuel and time costs.',
    revenue: 400000,
    badOutcome: 'yes',
    loss: 160000,
    gain: 400000,
    prob: 30,
    stake: 50000,
    hedgeDir: 'yes'
  },
  restaurant: {
    desc: 'London restaurant near the Emirates Stadium. Matchday crowd drives 60% of weekend revenue when Arsenal plays at home. Revenue drops sharply when Arsenal are away or lose.',
    revenue: 18000,
    badOutcome: 'no',
    loss: 10800,
    gain: 18000,
    prob: 62,
    stake: 2000,
    hedgeDir: 'no'
  },
  ski: {
    desc: 'Ski resort in the Alps. Full season revenue depends on sufficient snowfall by December. Low snowfall forces closure of upper runs and reduces visitor numbers by ~50%.',
    revenue: 2000000,
    badOutcome: 'yes',
    loss: 900000,
    gain: 2000000,
    prob: 28,
    stake: 200000,
    hedgeDir: 'yes'
  },
  energy: {
    desc: 'Gas utility company. Revenue from heating contracts drops significantly in a warm winter as consumption falls well below forecasts baked into pricing.',
    revenue: 5000000,
    badOutcome: 'yes',
    loss: 1500000,
    gain: 5000000,
    prob: 40,
    stake: 500000,
    hedgeDir: 'yes'
  },
  airline: {
    desc: 'Regional airline with unhedged fuel exposure. An oil price spike above $100/barrel in Q3 increases operating costs materially beyond budget.',
    revenue: 12000000,
    badOutcome: 'yes',
    loss: 2400000,
    gain: 12000000,
    prob: 45,
    stake: 800000,
    hedgeDir: 'yes'
  },
  farmer: {
    desc: 'Arable farm in East Anglia. A summer drought cuts wheat yield by ~40%, reducing harvestable tonnes and sale revenue significantly below the break-even threshold.',
    revenue: 300000,
    badOutcome: 'yes',
    loss: 120000,
    gain: 300000,
    prob: 22,
    stake: 30000,
    hedgeDir: 'yes'
  }
};

document.querySelectorAll('.preset-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.preset-btn').forEach(function(b){ b.classList.remove('active-preset'); });
    btn.classList.add('active-preset');
    var p = PRESETS[btn.dataset.preset];
    document.getElementById('rwDesc').value     = p.desc;
    document.getElementById('rwRevenue').value  = p.revenue;
    document.getElementById('rwBadOutcome').value = p.badOutcome;
    document.getElementById('rwLoss').value     = p.loss;
    document.getElementById('rwGain').value     = p.gain;
    document.getElementById('rwProb').value     = p.prob;
    document.getElementById('rwStake').value    = p.stake;
    document.getElementById('rwHedgeDir').value = p.hedgeDir;
  });
});

/* =========================================================
   TAB 1: STOCK / DUAL STRIKE  (original logic)
   ========================================================= */
document.getElementById('runBtn').addEventListener('click', analyzeStock);

function analyzeStock() {
  var S0       = parseFloat(document.getElementById('entryPrice').value);
  var posSz    = parseFloat(document.getElementById('positionSize').value);
  var stockDir = document.getElementById('stockDirection').value;
  var polyDir  = document.getElementById('polyDirection').value;
  var premium  = parseFloat(document.getElementById('premium').value);
  var payout   = parseFloat(document.getElementById('payout').value);
  var K        = parseFloat(document.getElementById('polyStrike').value);

  if ([S0,posSz,premium,payout,K].some(isNaN) || S0 <= 0 || K <= 0) {
    alert('Please fill all fields with valid positive numbers.');
    return;
  }

  var shares = posSz / S0;

  function totalPL(ST) {
    var stockPL = stockDir === 'long' ? shares*(ST-S0) : -shares*(ST-S0);
    var win = polyDir === 'up' ? ST > K : ST < K;
    return stockPL + (win ? payout - premium : -premium);
  }

  var minX = Math.max(0.01, Math.min(S0,K)*0.3);
  var maxX = Math.max(S0,K)*2.2;
  var N = 500;
  var step = (maxX-minX)/N;

  var prices = [], plVals = [], breakevens = [];
  var prevP = minX, prevPL = totalPL(minX);

  for (var i = 0; i <= N; i++) {
    var p = minX + i*step;
    var pl = totalPL(p);
    prices.push(p);
    plVals.push(pl);
    if (i > 0 && prevPL*pl <= 0 && Math.abs(pl-prevPL) > 1e-9) {
      var b = prevP - prevPL*(p-prevP)/(pl-prevPL);
      if (b >= minX && b <= maxX) breakevens.push(b);
    }
    prevP = p;
    prevPL = pl;
  }

  var bes = breakevens
    .map(function(x){ return Math.round(x*100)/100; })
    .filter(function(v,i,a){ return a.indexOf(v)===i; });

  var plAtS0 = totalPL(S0);
  var plAtK  = totalPL(K);
  var maxPL  = Math.max.apply(null, plVals);
  var minPL  = Math.min.apply(null, plVals);

  var profitPrices = prices.filter(function(_,i){ return plVals[i] > 0; });
  var lossPrices   = prices.filter(function(_,i){ return plVals[i] < 0; });

  var insight = '';
  if (stockDir==='short' && polyDir==='down')
    insight = 'Short stock (S\u2080 = '+S0+') combined with a down contract (K = '+K+'). The digital pays when price falls below '+K+', amplifying the short. Above the upper breakeven the short also profits \u2014 creating two profit windows.';
  else if (stockDir==='short' && polyDir==='up')
    insight = 'Short stock (S\u2080 = '+S0+') with an up contract (K = '+K+'). The digital pays above '+K+', partially offsetting short losses in a rally.';
  else if (stockDir==='long' && polyDir==='up')
    insight = 'Long stock (S\u2080 = '+S0+') with an up contract (K = '+K+'). Digital pays above '+K+', stacking gains. Downside limited to premium cost.';
  else
    insight = 'Long stock (S\u2080 = '+S0+') with a down contract (K = '+K+'). Digital pays below '+K+', hedging the long position.';

  function sign(v){ return v >= 0 ? 'pos' : 'neg'; }
  function fmt(v){ return (v >= 0 ? '+' : '') + v.toFixed(2); }

  var profitRange = profitPrices.length
    ? profitPrices[0].toFixed(2)+' \u2192 '+profitPrices[profitPrices.length-1].toFixed(2)
    : '\u2014';
  var lossRange = lossPrices.length
    ? lossPrices[0].toFixed(2)+' \u2192 '+lossPrices[lossPrices.length-1].toFixed(2)
    : '\u2014';
  var besStr = bes.length ? bes.map(function(x){ return x.toFixed(2); }).join(' \u00b7 ') : '\u2014';
  var besFontSize = bes.length > 1 ? '18px' : '28px';

  document.getElementById('output').innerHTML =
    '<div class="section">' +
      '<div class="section-label">Results</div>' +
      '<div class="metrics-row">' +
        '<div class="metric">' +
          '<div class="metric-label">P&amp;L at S\u2080 = '+S0+'</div>' +
          '<div class="metric-value '+sign(plAtS0)+'">'+fmt(plAtS0)+'</div>' +
          '<div class="metric-sub">At stock entry</div>' +
        '</div>' +
        '<div class="metric">' +
          '<div class="metric-label">P&amp;L at K = '+K+'</div>' +
          '<div class="metric-value '+sign(plAtK)+'">'+fmt(plAtK)+'</div>' +
          '<div class="metric-sub">At poly strike</div>' +
        '</div>' +
        '<div class="metric">' +
          '<div class="metric-label">Breakeven(s)</div>' +
          '<div class="metric-value" style="font-size:'+besFontSize+'">'+besStr+'</div>' +
          '<div class="metric-sub">Zero P&amp;L crossing'+(bes.length!==1?'s':'')+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="ranges-row">' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Profit range</div>' +
          '<div class="range-cell-value pos">'+profitRange+'</div>' +
        '</div>' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Loss range</div>' +
          '<div class="range-cell-value neg">'+lossRange+'</div>' +
        '</div>' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Max profit</div>' +
          '<div class="range-cell-value pos">'+fmt(maxPL)+'</div>' +
        '</div>' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Max loss</div>' +
          '<div class="range-cell-value neg">'+fmt(minPL)+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="div-line"></div>' +
      '<div class="section-label">Payoff chart</div>' +
      '<div class="chart-wrap"><canvas id="payoffChart"></canvas></div>' +
      '<div class="div-line"></div>' +
      '<div class="insight">' +
        '<strong>Insight \u2014 </strong>'+insight+
        ' Max observed: <span style="color:var(--green)">'+fmt(maxPL)+'</span>' +
        ' &nbsp;/&nbsp; <span style="color:var(--red)">'+fmt(minPL)+'</span>.' +
      '</div>' +
    '</div>';

  var existing = Chart.getChart('payoffChart');
  if (existing) existing.destroy();

  new Chart(document.getElementById('payoffChart'), {
    type: 'line',
    data: {
      labels: prices.map(function(p){ return p.toFixed(1); }),
      datasets: [
        {
          label: 'P&L',
          data: plVals,
          borderColor: '#0f0f0f',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1,
          fill: false
        },
        {
          label: 'Breakeven',
          data: bes.map(function(p){ return { x: p, y: 0 }; }),
          type: 'scatter',
          backgroundColor: '#2980b9',
          pointRadius: 6,
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false
        },
        {
          label: 'Poly Strike K',
          data: [{ x: K, y: totalPL(K) }],
          type: 'scatter',
          backgroundColor: '#e67e22',
          pointRadius: 8,
          pointStyle: 'triangle',
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false
        },
        {
          label: 'Entry S\u2080',
          data: [{ x: S0, y: totalPL(S0) }],
          type: 'scatter',
          backgroundColor: '#8e44ad',
          pointRadius: 6,
          pointStyle: 'rect',
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            font: { family: 'DM Mono', size: 10 },
            color: '#888',
            boxWidth: 10,
            padding: 16
          }
        },
        tooltip: {
          titleFont: { family: 'DM Mono', size: 10 },
          bodyFont:  { family: 'DM Mono', size: 10 },
          callbacks: {
            label: function(c) {
              if (c.dataset.label === 'Breakeven')     return 'Breakeven: $'+c.raw.x.toFixed(2);
              if (c.dataset.label === 'Poly Strike K') return 'K = $'+c.raw.x.toFixed(2)+' \u00b7 P&L: $'+c.raw.y.toFixed(2);
              if (c.dataset.label === 'Entry S\u2080') return 'S\u2080 = $'+c.raw.x.toFixed(2)+' \u00b7 P&L: $'+c.raw.y.toFixed(2);
              return 'P&L: $'+parseFloat(c.raw).toFixed(2)+' at $'+c.label;
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Stock price ($)', font: { family: 'DM Mono', size: 10 }, color: '#bbb' },
          ticks: { font: { family: 'DM Mono', size: 9 }, color: '#bbb', maxTicksLimit: 8 },
          grid:  { color: '#f0f0f0' },
          border: { display: false }
        },
        y: {
          title: { display: true, text: 'Profit / Loss ($)', font: { family: 'DM Mono', size: 10 }, color: '#bbb' },
          ticks: { font: { family: 'DM Mono', size: 9 }, color: '#bbb', maxTicksLimit: 6 },
          grid:  { color: '#f0f0f0' },
          border: { display: false }
        }
      }
    }
  });
}

/* =========================================================
   TAB 2: REAL-WORLD HEDGE
   ========================================================= */
document.getElementById('rwRunBtn').addEventListener('click', analyzeRealWorld);

function fmtMoney(v) {
  var abs = Math.abs(v);
  var s = abs >= 1e6 ? (abs/1e6).toFixed(2)+'M' : abs >= 1e3 ? (abs/1e3).toFixed(1)+'k' : abs.toFixed(0);
  return (v < 0 ? '-' : '') + '$' + s;
}
function fmtSign(v) { return (v >= 0 ? '+' : '') + fmtMoney(v); }
function signCls(v) { return v >= 0 ? 'pos' : 'neg'; }

function analyzeRealWorld() {
  var revenue    = parseFloat(document.getElementById('rwRevenue').value);
  var loss       = parseFloat(document.getElementById('rwLoss').value);
  var gain       = parseFloat(document.getElementById('rwGain').value);
  var prob       = parseFloat(document.getElementById('rwProb').value) / 100;
  var stake      = parseFloat(document.getElementById('rwStake').value);
  var hedgeDir   = document.getElementById('rwHedgeDir').value;
  var badOutcome = document.getElementById('rwBadOutcome').value;

  if ([revenue,loss,gain,stake].some(isNaN) || isNaN(prob) || prob <= 0 || prob >= 1) {
    alert('Please fill all fields with valid values. Probability must be between 1–99.');
    return;
  }

  // Payout from a binary market: bet $stake at prob odds
  // If betting YES at prob p: payout = stake / p (net profit = stake*(1-p)/p)
  // If betting NO at prob p:  payout = stake / (1-p)
  var polyPayout, polyNetWin, polyNetLoss;
  if (hedgeDir === 'yes') {
    polyPayout  = stake / prob;          // total returned if YES wins
    polyNetWin  = polyPayout - stake;    // net profit
    polyNetLoss = -stake;
  } else {
    polyPayout  = stake / (1 - prob);
    polyNetWin  = polyPayout - stake;
    polyNetLoss = -stake;
  }

  // Determine which poly outcome covers the business bad event
  var hedgeWorks = (badOutcome === hedgeDir);
  // "hedgeWorks" = the bad business event IS the event the poly bet wins on

  // Scenario outcomes
  // BAD BUSINESS EVENT HAPPENS:
  //   business: -loss (relative to normal revenue)
  //   poly: +polyNetWin if hedgeWorks, else +polyNetLoss
  var bizBadNet  = -loss;
  var polyBadNet = hedgeWorks ? polyNetWin : polyNetLoss;
  var totalBad   = bizBadNet + polyBadNet;

  // GOOD BUSINESS EVENT HAPPENS:
  //   business: +gain
  //   poly: opposite
  var bizGoodNet  = gain;
  var polyGoodNet = hedgeWorks ? polyNetLoss : polyNetWin;
  var totalGood   = bizGoodNet + polyGoodNet;

  // Expected values
  var pBad  = badOutcome === 'yes' ? prob : (1 - prob);
  var pGood = 1 - pBad;
  var evBiz   = pBad * (-loss) + pGood * gain;
  var evPoly  = pBad * polyBadNet + pGood * polyGoodNet;
  var evTotal = evBiz + evPoly;
  var evUnhedged = evBiz;

  // Hedge ratio: how much of the loss is covered
  var hedgeCoverage = hedgeWorks
    ? Math.min(1, polyNetWin / loss) * 100
    : 0;

  // Cost of hedge as % of potential loss
  var hedgeCost = (stake / loss) * 100;

  function fmtPct(v){ return (v >= 0 ? '' : '-') + Math.abs(v).toFixed(1) + '%'; }

  var hedgeEffective = hedgeWorks;
  var hedgeWarn = !hedgeEffective
    ? '<div class="insight" style="border-left-color:#e67e22;margin-bottom:20px"><strong>⚠ Direction mismatch \u2014 </strong>Your Polymarket bet resolves in the <em>opposite</em> scenario to your business risk. The hedge will cost you the stake in <em>both</em> bad and good outcomes only if the bet wins when the business is also doing well. Review your Poly Direction to ensure it pays out when the bad event occurs.</div>'
    : '';

  // Insight text
  var eventLabel = badOutcome === 'yes' ? 'the event happens' : 'the event does not happen';
  var insightText = 'When <strong>' + eventLabel + '</strong>, the business loses ' + fmtMoney(loss) +
    '. The Polymarket position ' + (hedgeEffective ? 'pays out <strong>' + fmtMoney(polyNetWin) + '</strong>, covering <strong>' + hedgeCoverage.toFixed(0) + '%</strong> of the loss' : 'also loses <strong>' + fmtMoney(stake) + '</strong> (direction mismatch \u2014 see warning above)') +
    '. Net position in the bad scenario: <strong>' + fmtSign(totalBad) + '</strong>.' +
    ' Expected value with hedge: <strong>' + fmtSign(evTotal) + '</strong> vs unhedged <strong>' + fmtSign(evUnhedged) + '</strong>.';

  // Coverage bar width (cap at 100)
  var barWidth = Math.min(100, hedgeCoverage);

  document.getElementById('rw-output').innerHTML =
    '<div class="section">' +
      '<div class="section-label">Hedge analysis</div>' +
      hedgeWarn +
      '<div class="hedge-output-grid">' +
        '<div class="hedge-cell">' +
          '<div class="hedge-cell-label">Bad event — net P&L</div>' +
          '<div class="hedge-cell-value ' + signCls(totalBad) + '">' + fmtSign(totalBad) + '</div>' +
          '<div class="hedge-cell-sub">Business ' + fmtSign(bizBadNet) + ' &nbsp;+&nbsp; Poly ' + fmtSign(polyBadNet) + '</div>' +
        '</div>' +
        '<div class="hedge-cell">' +
          '<div class="hedge-cell-label">Good event — net P&L</div>' +
          '<div class="hedge-cell-value ' + signCls(totalGood) + '">' + fmtSign(totalGood) + '</div>' +
          '<div class="hedge-cell-sub">Business ' + fmtSign(bizGoodNet) + ' &nbsp;+&nbsp; Poly ' + fmtSign(polyGoodNet) + '</div>' +
        '</div>' +
        '<div class="hedge-cell">' +
          '<div class="hedge-cell-label">EV — hedged</div>' +
          '<div class="hedge-cell-value ' + signCls(evTotal) + ' neutral">' + fmtSign(evTotal) + '</div>' +
          '<div class="hedge-cell-sub">At market implied prob ' + (prob*100).toFixed(0) + '%</div>' +
        '</div>' +
        '<div class="hedge-cell">' +
          '<div class="hedge-cell-label">EV — unhedged</div>' +
          '<div class="hedge-cell-value ' + signCls(evUnhedged) + '">' + fmtSign(evUnhedged) + '</div>' +
          '<div class="hedge-cell-sub">EV delta: ' + fmtSign(evTotal - evUnhedged) + '</div>' +
        '</div>' +
      '</div>' +

      '<div class="section-label">Scenario breakdown</div>' +
      '<table class="scenario-table">' +
        '<thead><tr>' +
          '<th>Scenario</th><th>Probability</th><th>Business P&L</th><th>Polymarket P&L</th><th>Net total</th>' +
        '</tr></thead>' +
        '<tbody>' +
          '<tr>' +
            '<td class="val">Bad event <span class="tag event">' + (badOutcome === 'yes' ? 'YES' : 'NO') + ' resolves</span></td>' +
            '<td>' + (pBad*100).toFixed(0) + '%</td>' +
            '<td class="neg">' + fmtSign(bizBadNet) + '</td>' +
            '<td class="' + signCls(polyBadNet) + '">' + fmtSign(polyBadNet) + '</td>' +
            '<td class="' + signCls(totalBad) + ' val">' + fmtSign(totalBad) + '</td>' +
          '</tr>' +
          '<tr>' +
            '<td class="val">Good event <span class="tag hedge">' + (badOutcome === 'yes' ? 'NO' : 'YES') + ' resolves</span></td>' +
            '<td>' + (pGood*100).toFixed(0) + '%</td>' +
            '<td class="pos">' + fmtSign(bizGoodNet) + '</td>' +
            '<td class="' + signCls(polyGoodNet) + '">' + fmtSign(polyGoodNet) + '</td>' +
            '<td class="' + signCls(totalGood) + ' val">' + fmtSign(totalGood) + '</td>' +
          '</tr>' +
        '</tbody>' +
      '</table>' +

      (hedgeEffective ?
        '<div class="section-label">Loss coverage</div>' +
        '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">' +
          '<div style="flex:1">' +
            '<div style="font-size:10px;color:var(--ink3);letter-spacing:.06em;margin-bottom:6px">Poly payout covers <strong style="color:var(--ink)">' + hedgeCoverage.toFixed(0) + '%</strong> of the bad-event loss &nbsp;·&nbsp; Cost of hedge: <strong style="color:var(--ink)">' + fmtPct(hedgeCost) + '</strong> of at-risk revenue</div>' +
            '<div class="hedge-ratio-bar"><div class="hedge-ratio-fill" style="width:' + barWidth + '%"></div></div>' +
          '</div>' +
          '<div style="font-family:\'EB Garamond\',serif;font-size:22px;color:var(--green);white-space:nowrap">' + hedgeCoverage.toFixed(0) + '%</div>' +
        '</div>'
      : '') +

      '<div class="div-line"></div>' +
      '<div class="insight"><strong>Insight \u2014 </strong>' + insightText + '</div>' +
    '</div>';
}
</script>
</body>
</html>
