<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Polymarket Hedge – Dual Strike Analysis</title>
<!-- Chart.js for clean, interactive graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body {
        margin:0;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        background:#f4f6f9;
        padding:60px 20px 20px 20px;
        color:#111;
        min-height:100vh;
        display:flex;
        flex-direction:column;
    }
    .wrapper { 
        max-width:1100px; 
        margin:0 auto; 
        flex:1;
        width:100%;
    }
    h1 { 
        font-weight:500; 
        margin-bottom:40px;
        font-size:2rem;
        background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        display:inline-block;
    }

    .card {
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 8px 25px rgba(0,0,0,0.05);
        margin-bottom:30px;
        transition:transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
        box-shadow:0 12px 30px rgba(0,0,0,0.1);
    }

    .grid {
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    label { 
        font-size:13px; 
        color:#666; 
        font-weight:500;
        display:flex;
        align-items:center;
        gap:5px;
    }
    label i {
        color:#667eea;
        width:18px;
    }
    input, select {
        width:100%;
        padding:10px;
        margin-top:5px;
        border-radius:8px;
        border:1px solid #ddd;
        box-sizing:border-box;
        font-size:14px;
        transition:border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
        outline:none;
        border-color:#667eea;
        box-shadow:0 0 0 3px rgba(102,126,234,0.1);
    }

    button {
        margin-top:25px;
        padding:12px 24px;
        width:100%;
        border-radius:8px;
        border:none;
        background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color:white;
        font-size:16px;
        font-weight:500;
        cursor:pointer;
        transition:transform 0.2s, box-shadow 0.2s;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
    }
    button:hover {
        transform:translateY(-1px);
        box-shadow:0 8px 20px rgba(102,126,234,0.3);
    }
    button i {
        font-size:18px;
    }

    .result-grid {
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:15px;
        margin:20px 0;
    }
    .result-block {
        padding:18px;
        border-left:4px solid;
        background:#fafafa;
        border-radius:6px;
        box-shadow:0 2px 5px rgba(0,0,0,0.02);
        transition:transform 0.2s;
    }
    .result-block:hover {
        transform:translateX(5px);
    }
    .result-block:nth-child(1) { border-left-color:#f39c12; }
    .result-block:nth-child(2) { border-left-color:#3498db; }
    .result-block:nth-child(3) { border-left-color:#2ecc71; }
    .result-block:nth-child(4) { border-left-color:#e74c3c; }
    
    .result-block strong { 
        font-weight:600; 
        display:block;
        margin-bottom:8px;
        color:#222;
        font-size:1.1rem;
    }
    .result-value {
        font-size:1.3rem;
        font-weight:600;
        color:#2c3e50;
    }
    .badge {
        background:linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
        padding:6px 14px;
        border-radius:30px;
        font-size:0.85rem;
        color:#4a5568;
        display:inline-block;
        border:1px solid #667eea40;
    }
    .chart-container {
        margin-top:25px;
        position:relative;
        height:350px;
        width:100%;
        background:white;
        border-radius:8px;
        padding:15px;
        box-shadow:inset 0 2px 10px rgba(0,0,0,0.02);
    }
    .legend-inline {
        display:flex;
        gap:25px;
        flex-wrap:wrap;
        margin-top:15px;
        font-size:0.9rem;
        padding:10px;
        background:#f8fafc;
        border-radius:8px;
    }
    .profit-zone { color:#2e7d32; font-weight:500; }
    .loss-zone { color:#c62828; font-weight:500; }
    .breakeven-dot { 
        display:inline-block; 
        width:12px; 
        height:12px; 
        background:#3498db; 
        border-radius:50%; 
        margin-right:4px;
        box-shadow:0 2px 5px rgba(52,152,219,0.3);
    }
    .strike-dot {
        display:inline-block; 
        width:12px; 
        height:12px; 
        background:#f39c12; 
        border-radius:50%; 
        margin-right:4px;
        box-shadow:0 2px 5px rgba(243,156,18,0.3);
    }
    .note {
        background:linear-gradient(135deg, #f8fafc 0%, #eef2f6 100%);
        padding:16px 20px;
        border-radius:10px;
        font-size:0.95rem;
        color:#2c3e50;
        margin-top:20px;
        border-left:4px solid #667eea;
    }

    /* Footer Styles */
    .footer {
        background:white;
        border-radius:12px;
        padding:30px;
        margin-top:40px;
        box-shadow:0 8px 25px rgba(0,0,0,0.05);
        text-align:center;
        border:2px dashed #667eea40;
    }
    .footer-content {
        color:#2c3e50;
    }
    .footer i {
        color:#667eea;
        margin:0 5px;
    }
    .footer-divider {
        height:2px;
        background:linear-gradient(90deg, transparent, #667eea40, transparent);
        margin:20px 0;
    }

    @media (max-width: 600px) {
        .grid, .result-grid {
            grid-template-columns:1fr;
        }
    }
</style>
</head>
<body>

<div class="wrapper">

<h1><i class="fas fa-chart-line" style="margin-right:10px;"></i>Polymarket Hedge – V1</h1>

<div class="card">
<div class="grid">

<div>
<label><i class="fas fa-coins"></i> Stock Entry Price (S₀)</label>
<input type="number" id="entryPrice" step="any" value="100">
</div>

<div>
<label><i class="fas fa-dollar-sign"></i> Stock Position Size ($)</label>
<input type="number" id="positionSize" step="any" value="1000">
</div>

<div>
<label><i class="fas fa-arrow-up"></i> Stock Direction</label>
<select id="stockDirection">
<option value="short" selected>Short</option>
<option value="long">Long</option>
</select>
</div>

<div>
<label><i class="fas fa-flag-checkered"></i> Poly Direction</label>
<select id="polyDirection">
<option value="up">Up</option>
<option value="down" selected>Down</option>
</select>
</div>

<div>
<label><i class="fas fa-tag"></i> Poly Premium</label>
<input type="number" id="premium" step="any" value="10">
</div>

<div>
<label><i class="fas fa-gift"></i> Poly Payout</label>
<input type="number" id="payout" step="any" value="99">
</div>

<!-- NEW ROW: two extra fields for strike price (if different from S0) -->
<div>
<label><i class="fas fa-bullseye"></i> Poly Strike Price (K)</label>
<input type="number" id="polyStrike" step="any" value="105" placeholder="e.g., 105">
</div>

<div>
<label><i class="fas fa-info-circle"></i> (K vs S₀) </label>
<input style="background:#f0f3f8;" type="text" id="strikeNote" readonly value="Separate from entry" disabled>
</div>

</div>

<button onclick="analyze()"><i class="fas fa-play"></i> Run Full Analysis & Update Chart</button>
</div>

<div id="output"></div>

<!-- Footer -->
<div class="footer">
    <div class="footer-content">
        <i class="" style="color:#667eea; opacity:0.8;"></i>
        <h3 style="margin:15px 0 10px 0; font-weight:500;">Matteo Ingram</h3>
        
        <div style="margin:20px 0;">
            <a href="https://www.linkedin.com/in/matteo-ingram/" 
   target="_blank" 
   style="
      display: inline-block;
      padding: 10px 18px;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin: 5px 0;
   ">
   <i class="fab fa-linkedin"></i> Linkedin
</a>  
            <p style="margin:5px 0;"><i class="fas fa-envelope"></i> ing.matteo.mi@gmail.com</p>
        </div>
        
    </div>
</div>

</div>

<script>
function analyze(){

    // --- input parsing ---
    let S0 = parseFloat(document.getElementById("entryPrice").value);
    let positionSize = parseFloat(document.getElementById("positionSize").value);
    let stockDirection = document.getElementById("stockDirection").value;
    let polyDirection = document.getElementById("polyDirection").value;
    let premium = parseFloat(document.getElementById("premium").value);
    let payout = parseFloat(document.getElementById("payout").value);
    let polyStrike = parseFloat(document.getElementById("polyStrike").value);

    if (isNaN(S0) || isNaN(positionSize) || isNaN(premium) || isNaN(payout) || isNaN(polyStrike) || S0 <= 0 || polyStrike <= 0) {
        alert("Please fill all fields with valid positive numbers.");
        return;
    }

    let shares = positionSize / S0;

    // --- payoff function with separate polymarket strike (K) ---
    function totalPL(ST){
        let stockPL = (stockDirection === "long")
            ? shares * (ST - S0)
            : -shares * (ST - S0);

        // Digital condition based on polyStrike (K) instead of S0
        let polyWin = (polyDirection === "up")
            ? ST > polyStrike
            : ST < polyStrike;

        let polyPL = polyWin ? (payout - premium) : -premium;
        return stockPL + polyPL;
    }

    // --- P&L at S0 and at strike (K) ---
    let lossAtS0 = totalPL(S0);
    let lossAtStrike = totalPL(polyStrike);

    // --- generate data series for chart + breakeven scanning ---
    let minX = Math.max(0.01, Math.min(S0, polyStrike) * 0.3);
    let maxX = Math.max(S0, polyStrike) * 2.2;
    let points = 400;
    let step = (maxX - minX) / points;

    let prices = [];
    let plValues = [];
    let profitZones = [];
    let lossZones = [];

    let breakevens = [];
    let prevPrice = minX;
    let prevPL = totalPL(prevPrice);

    for (let i = 0; i <= points; i++) {
        let price = minX + i * step;
        let pl = totalPL(price);
        prices.push(price);
        plValues.push(pl);

        if (pl > 0) profitZones.push(price);
        else lossZones.push(price);

        if (i > 0 && (prevPL * pl <= 0) && Math.abs(pl - prevPL) > 1e-9) {
            let b = prevPrice - prevPL * (price - prevPrice) / (pl - prevPL);
            if (b >= minX && b <= maxX) breakevens.push(b);
        }
        prevPrice = price;
        prevPL = pl;
    }

    breakevens = [...new Set(breakevens.map(x => Math.round(x*100)/100))];

    let profitMin = profitZones.length ? Math.min(...profitZones) : null;
    let profitMax = profitZones.length ? Math.max(...profitZones) : null;
    let lossMin = lossZones.length ? Math.min(...lossZones) : null;
    let lossMax = lossZones.length ? Math.max(...lossZones) : null;

    // --- insight generation, accounting for dual strikes ---
    let insight = "";
    if (stockDirection === "short" && polyDirection === "down") {
        insight = `Short stock (entry ${S0}) + down contract (strike ${polyStrike}): profit in two regions if stock falls below K (digital pays) OR if stock rallies above upper breakeven (short pays).`;
    } else if (stockDirection === "short" && polyDirection === "up") {
        insight = `Short stock (${S0}) + up contract (strike ${polyStrike}): digital pays when stock rises above ${polyStrike}, offsetting short loss.`;
    } else if (stockDirection === "long" && polyDirection === "up") {
        insight = `Long stock (${S0}) + up contract (strike ${polyStrike}): extra profit above K. Loss limited to premium if stock falls.`;
    } else if (stockDirection === "long" && polyDirection === "down") {
        insight = `Long stock (${S0}) + down contract (strike ${polyStrike}): digital pays below ${polyStrike}, cushioning long.`;
    } else {
        insight = `Digital strike at ${polyStrike} (different from stock entry ${S0}) creates two critical levels.`;
    }

    let maxPL = Math.max(...plValues);
    let minPL = Math.min(...plValues);

    let html = `
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap;">
            <h2 style="margin:0; font-weight:400;"><i class="fas fa-chart-bar"></i> Payoff profile</h2>
            <span class="badge"><i class="fas fa-bullseye"></i> Stock entry: ${S0} | Poly strike: ${polyStrike}</span>
        </div>

        <div class="result-grid">
            <div class="result-block">
                <strong><i class="fas fa-pause-circle"></i> P&L at S₀ = ${S0}</strong>
                <span class="result-value">${lossAtS0.toFixed(2)}</span>
                <div style="margin-top:6px; color:#555;">At stock entry price</div>
            </div>
            <div class="result-block">
                <strong><i class="fas fa-bullseye"></i> P&L at strike K = ${polyStrike}</strong>
                <span class="result-value">${lossAtStrike.toFixed(2)}</span>
                <div style="margin-top:6px; color:#555;">At polymarket strike</div>
            </div>
            <div class="result-block">
                <strong><i class="fas fa-equals"></i> Breakeven(s)</strong>
                <span class="result-value">${breakevens.length > 0 ? breakevens.map(x=>x.toFixed(2)).join(" | ") : "—"}</span>
                <div style="margin-top:6px; color:#555;">Zero P&L crossings</div>
            </div>
            <div class="result-block">
                <strong class="profit-zone"><i class="fas fa-arrow-up"></i> Profit range</strong>
                <span class="result-value">${profitMin !== null ? profitMin.toFixed(2) : "—"} → ${profitMax !== null ? profitMax.toFixed(2) : "—"}</span>
                ${profitMin !== null ? `<div style="margin-top:6px;">Width: ${(profitMax - profitMin).toFixed(2)}</div>` : ''}
            </div>
            <div class="result-block">
                <strong class="loss-zone"><i class="fas fa-arrow-down"></i> Loss range</strong>
                <span class="result-value">${lossMin !== null ? lossMin.toFixed(2) : "—"} → ${lossMax !== null ? lossMax.toFixed(2) : "—"}</span>
                ${lossMin !== null ? `<div style="margin-top:6px;">Width: ${(lossMax - lossMin).toFixed(2)}</div>` : ''}
            </div>
        </div>

        <div class="legend-inline">
            <span><span class="profit-zone"><i class="fas fa-circle" style="color:#2e7d32;"></i> Profit zone</span> (P&L > 0)</span>
            <span><span class="loss-zone"><i class="fas fa-circle" style="color:#c62828;"></i> Loss zone</span> (P&L < 0)</span>
            <span><span class="breakeven-dot"></span> Breakeven</span>
            <span><span class="strike-dot"></span> Poly strike K = ${polyStrike}</span>
        </div>

        <div class="chart-container">
            <canvas id="payoffChart"></canvas>
        </div>

        <div class="note">
            <strong><i class="fas fa-brain"></i> Dual-strike insight:</strong> ${insight} The digital option creates a jump at K = ${polyStrike} (orange marker). 
            Maximum observed: <span class="profit-zone">${maxPL.toFixed(2)}</span> / <span class="loss-zone">${minPL.toFixed(2)}</span>. Stock entry at ${S0}.
        </div>
    </div>
    `;

    document.getElementById("output").innerHTML = html;

    // --- render chart with both strikes annotated ---
    const ctx = document.getElementById('payoffChart').getContext('2d');
    let existingChart = Chart.getChart(ctx);
    if (existingChart) existingChart.destroy();

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: prices.map(p => p.toFixed(1)),
            datasets: [
                {
                    label: 'P&L ($)',
                    data: plValues,
                    borderColor: '#2c3e50',
                    backgroundColor: 'rgba(44,62,80,0.02)',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.1,
                    fill: false,
                },
                {
                    label: 'Breakeven',
                    data: breakevens.map(p => ({x: p, y: 0})),
                    type: 'scatter',
                    backgroundColor: '#3498db',
                    pointRadius: 6,
                    pointStyle: 'circle',
                    borderColor: 'white',
                    borderWidth: 1.5,
                    showLine: false,
                },
                {
                    label: 'Poly Strike',
                    data: [{x: polyStrike, y: totalPL(polyStrike)}],
                    type: 'scatter',
                    backgroundColor: '#f39c12',
                    pointRadius: 10,
                    pointStyle: 'triangle',
                    borderColor: 'white',
                    borderWidth: 2,
                    showLine: false,
                },
                {
                    label: 'Entry Price',
                    data: [{x: S0, y: totalPL(S0)}],
                    type: 'scatter',
                    backgroundColor: '#9b59b6',
                    pointRadius: 8,
                    pointStyle: 'rect',
                    borderColor: 'white',
                    borderWidth: 1.5,
                    showLine: false,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            if (ctx.dataset.label === 'Breakeven') return `Breakeven: $${ctx.raw.x.toFixed(2)}`;
                            if (ctx.dataset.label === 'Poly Strike') return `Poly strike K: $${ctx.raw.x.toFixed(2)} | P&L: $${ctx.raw.y.toFixed(2)}`;
                            if (ctx.dataset.label === 'Entry Price') return `Entry S₀: $${ctx.raw.x.toFixed(2)} | P&L: $${ctx.raw.y.toFixed(2)}`;
                            return `P&L: $${ctx.raw.y.toFixed(2)} at $${ctx.label}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    title: { display: true, text: 'Stock price ($)' },
                    grid: { color: '#e0e6ed' }
                },
                y: {
                    title: { display: true, text: 'Profit / Loss ($)' },
                    grid: { color: '#e0e6ed' }
                }
            },
            elements: { point: { radius: 0 } }
        }
    });
}

// Run initial analysis on page load
window.onload = function() {
    analyze();
}
</script>
</body>
</html>
